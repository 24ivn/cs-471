{% extends "layouts/base.html" %}
{% block content %}
    <h2>Search Results from Database:</h2>
    <ul>
    {% for book in books %}
        <li>ID: {{ book.id }}, Title: <strong>{{ book.title }}</strong> by {{ book.author }}</li>
    {% empty %}
        <li>No books found in the database.</li>
    {% endfor %}
    </ul>
    <br>
    <a href="{% url 'search' %}">Back to Search</a>
{% endblock content %}
