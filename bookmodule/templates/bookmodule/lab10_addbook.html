<h2>Add New Book</h2>
<form method="POST">
    {% csrf_token %}
    <p>Title: <input type="text" name="title" required></p>
    <p>Price: <input type="number" step="0.01" name="price" required></p>
    <p>Quantity: <input type="number" name="quantity" required></p>
    <p>Publish Date: <input type="date" name="pubdate" required></p>
    <p>Publisher: 
        <select name="publisher" required>
            {% for pub in publishers %}
            <option value="{{ pub.id }}">{{ pub.name }}</option>
            {% endfor %}
        </select>
    </p>
    <button type="submit">Save Book</button>
</form>
<br>
