<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-5">
    <h2>Students List </h2>
    <a href="/books/lab11/add_student" class="btn btn-primary mb-3">Add New Student</a>
    
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Student Name</th>
                <th>Age</th>
                <th>Addresses</th>
            </tr>
        </thead>
        <tbody>
            {% for student in students %}
            <tr>
                <td>{{ student.name }}</td>
                <td>{{ student.age }}</td>
                <td>
                    <ul>
                    {% for address in student.addresses.all %}
                        <li>{{ address.city }} - {{ address.street }}</li>
                    {% endfor %}
                    </ul>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="3">No students found.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <a href="/books/lab10/listbooks" class="btn btn-secondary">Back to Books</a>
</div>
