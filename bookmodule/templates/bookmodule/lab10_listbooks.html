<h2>Books List - Lab 10</h2>
<a href="/books/lab9_part1/addbook" style="display:inline-block; margin-bottom:15px;">+ Add New Book</a>
<table border="1" cellpadding="5" cellspacing="0">
    <thead style="background-color: #f2f2f2;">
        <tr>
            <th>Title</th>
            <th>Price</th>
            <th>Quantity</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for book in books %}
        <tr>
            <td>{{ book.title }}</td>
            <td>{{ book.price }}</td>
            <td>{{ book.quantity }}</td>
            <td>
                <a href="/books/lab9_part1/editbook/{{ book.id }}">Edit</a> | 
                <a href="/books/lab9_part1/deletebook/{{ book.id }}" onclick="return confirm('Are you sure you want to delete this book?')">Delete</a>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No books found.</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
